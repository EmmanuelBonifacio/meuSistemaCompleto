# ==============================================================================
# nginx.dev.conf — Proxy Reverso de Desenvolvimento
#
# Roteamento de subdomínios:
#   app.test         → Container "laravel" (porta 9000 via FPM ou 8000 via artisan serve)
#   financeiro.test  → Container "erpnext" (porta 8000 do Gunicorn)
#
# Pré-requisito no host (Windows):
#   Adicionar em C:\Windows\System32\drivers\etc\hosts:
#     127.0.0.1  app.test
#     127.0.0.1  financeiro.test
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------------------------
    # Laravel — app.test
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name app.test;

        root /var/www/html/public;
        index index.php index.html;

        # Passa o host original para o Laravel (necessário para URL generation)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass   laravel:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            include        fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }

    # --------------------------------------------------------------------------
    # ERPNext — financeiro.test
    # Frappe usa o header "Host" para identificar o site.
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name financeiro.test;

        location / {
            proxy_pass         http://erpnext:8000;
            proxy_set_header   Host              financeiro.test;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # WebSocket do ERPNext (realtime)
            proxy_read_timeout 86400;
        }

        # Assets estáticos do ERPNext (performance)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass       http://erpnext:8000;
            proxy_set_header Host financeiro.test;
            expires          1d;
            add_header       Cache-Control "public";
        }
    }
}

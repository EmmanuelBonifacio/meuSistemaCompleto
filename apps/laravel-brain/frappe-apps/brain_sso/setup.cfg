# brain_sso — Custom App Frappe para SSO com o Laravel (Cérebro)
#
# Instalação no ERPNext (dentro do container):
#   cd /home/frappe/frappe-bench
#   bench get-app brain_sso /home/frappe/frappe-bench/apps/brain_sso
#   bench --site financeiro.test install-app brain_sso
#
# Estrutura mínima exigida pelo Frappe Framework:
#   brain_sso/
#   ├── __init__.py
#   ├── hooks.py
#   ├── modules.txt
#   └── brain_sso/
#       ├── __init__.py
#       └── auth.py          ← endpoint de validação do JWT (Fase 2)

[requires]
frappe = ">=15.0.0"

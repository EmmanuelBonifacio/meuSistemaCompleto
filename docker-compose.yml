# =============================================================================
# docker-compose.yml  (desenvolvimento)
# =============================================================================
# Sobe PostgreSQL + pgAdmin + engines do módulo Gestão de Frota para dev local.
# O backend e o frontend rodam localmente com `npm run dev` (hot reload).
#
# Uso:
#   docker compose up -d                          → sobe tudo
#   docker compose up traccar fleetbase fleetms -d → apenas as engines de frota
#   cd apps/backend && npm run dev
#   cd apps/frontend && npm run dev
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-saas_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_dev_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas_dev_net

  # ---------------------------------------------------------------------------
  # ENGINE 1: Traccar — Rastreamento GPS em tempo real
  # ---------------------------------------------------------------------------
  # Responsabilidade: receber posições GPS dos veículos via protocolos nativos
  #   e expor REST API para consulta de posições, histórico e alertas.
  # Porta 8082: REST API (usada pelo backend Node.js)
  # Porta 5055: receptor de protocolo GPS (OsmAnd, etc.)
  # Config: ./docker/traccar/traccar.xml aponta para o mesmo postgres do projeto.
  # ---------------------------------------------------------------------------
  traccar:
    image: traccar/traccar:latest
    container_name: traccar_dev
    restart: unless-stopped
    ports:
      - "8082:8082" # REST API
      - "5055:5055" # Protocolo OsmAnd (GPS)
    volumes:
      - ./docker/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_dev_data:/opt/traccar/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas_dev_net

  # ---------------------------------------------------------------------------
  # ENGINE 2: Fleetbase — Despacho, motoristas e ordens de serviço
  # ---------------------------------------------------------------------------
  # Responsabilidade: gerenciar frotas, motoristas, ordens de despacho e rotas.
  # Porta 4200: REST API (usada pelo backend Node.js via API Key por tenant)
  # ---------------------------------------------------------------------------
  fleetbase:
    image: fleetbase/fleetbase:latest
    container_name: fleetbase_dev
    restart: unless-stopped
    ports:
      - "4200:8000" # API HTTP interna (8000) exposta na 4200
    volumes:
      - fleetbase_dev_data:/var/www/fleetbase/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:4200
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${FLEETBASE_DB:-fleetbase_dev}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas_dev_net

  # ---------------------------------------------------------------------------
  # ENGINE 3: Fleetms — Manutenção de veículos, documentos e combustível
  # ---------------------------------------------------------------------------
  # Responsabilidade: controlar manutenções preventivas/corretivas, documentos
  #   de veículos (CRLV, seguro) e abastecimentos.
  # Porta 4000: REST API (usada pelo backend Node.js via Bearer token por tenant)
  # ---------------------------------------------------------------------------
  fleetms:
    image: ghcr.io/jmnda-dev/fleetms:latest
    container_name: fleetms_dev
    restart: unless-stopped
    ports:
      - "4000:3000" # Porta interna 3000 exposta na 4000
    volumes:
      - fleetms_dev_data:/app/data
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${FLEETMS_DB:-fleetms_dev}
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas_dev_net

  # ---------------------------------------------------------------------------
  # ENGINE 4: GraphHopper — Roteamento e matriz de distâncias via OpenStreetMap
  # ---------------------------------------------------------------------------
  # Responsabilidade: calcular rotas, matrizes de tempo/distância e geocodificação
  #   a partir de dados OSM locais (sem chave de API, sem custo).
  # Porta 8989: REST API (usada pelo backend Node.js via GRAPHHOPPER_URL)
  #
  # PRÉ-REQUISITO: baixar o mapa OSM uma vez antes de subir:
  #   bash scripts/download-osm.sh
  # ---------------------------------------------------------------------------
  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: graphhopper_dev
    restart: unless-stopped
    volumes:
      - ./docker/graphhopper/data:/data
    command: ["--input", "/data/minas-gerais-latest.osm.pbf", "--host", "0.0.0.0", "--graph-cache", "/data/graph-cache"]
    environment:
      - JAVA_OPTS=-Xmx2g -Xms512m
    ports:
      - "8989:8989"
    networks:
      - saas_dev_net

  # ---------------------------------------------------------------------------
  # ENGINE 5: VROOM — Motor de otimização de rotas (VRP)
  # ---------------------------------------------------------------------------
  # Responsabilidade: resolver o Vehicle Routing Problem recebendo a matriz de
  #   distâncias pré-calculada pelo GraphHopper (nosso backend Node.js faz isso).
  #   O VROOM não precisa chamar o GraphHopper diretamente — recebe a matriz.
  # Porta 3002 (host) → 3000 (container)
  # ---------------------------------------------------------------------------
  vroom:
    image: vroomvrp/vroom-docker:v1.13.0
    container_name: vroom_dev
    restart: unless-stopped
    volumes:
      - ./docker/vroom:/conf
    ports:
      - "3002:3000"
    depends_on:
      - graphhopper
    networks:
      - saas_dev_net

networks:
  saas_dev_net:
    driver: bridge

volumes:
  postgres_dev_data:
  traccar_dev_data:
  fleetbase_dev_data:
  fleetms_dev_data:

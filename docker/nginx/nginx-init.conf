# =============================================================================
# docker/nginx/nginx-init.conf
# =============================================================================
# Configuração TEMPORÁRIA usada APENAS durante o script init-ssl.sh.
# Serve apenas na porta 80 para que o Certbot possa completar o ACME challenge.
# Após o certificado ser obtido, o stack sobe com nginx.conf (SSL completo).
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Diretório onde o certbot deposita os tokens ACME
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Configurando SSL... aguarde.\n';
            add_header Content-Type text/plain;
        }
    }
}

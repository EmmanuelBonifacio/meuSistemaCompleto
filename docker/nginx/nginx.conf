# =============================================================================
# docker/nginx/nginx.conf
# =============================================================================
# ATENÇÃO: Este arquivo é um TEMPLATE processado pelo envsubst na inicialização.
# A variável ${DOMAIN} é substituída pelo valor definido no .env do servidor.
#
# Fluxo de requisição:
#   Browser → Nginx (80)  → ACME challenge (Let's Encrypt)
#                         → redirect 301 para HTTPS
#   Browser → Nginx (443) → api.${DOMAIN} → backend:3000
#                         → app.${DOMAIN} → frontend:3001
#
# Certificados gerenciados pelo Let's Encrypt (Certbot).
# Para obter o certificado inicial, execute: ./scripts/init-ssl.sh
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;
    server_tokens      off;
    client_max_body_size 110m;

    upstream backend  { server backend:3000; }
    upstream frontend { server frontend:3001; }

    # ─── HTTP: ACME challenge (Let's Encrypt) + redirect para HTTPS ──────────
    server {
        listen 80;
        server_name api.${DOMAIN} app.${DOMAIN};

        # Diretório onde o certbot deposita os tokens do ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS: api.${DOMAIN} (Backend/Fastify) ──────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.${DOMAIN};

        # Certificado gerado pelo Certbot (cobre api.DOMAIN e app.DOMAIN)
        ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        location /uploads/ {
            alias /uploads/;
            expires 10m;
            add_header Cache-Control "public, max-age=600";
            types { }
            default_type application/octet-stream;
        }

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ─── HTTPS: app.${DOMAIN} (Frontend/Next.js) ─────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.${DOMAIN};

        # Mesmo certificado — já cobre app.DOMAIN como SAN
        ssl_certificate     /etc/letsencrypt/live/api.${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.${DOMAIN}/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}

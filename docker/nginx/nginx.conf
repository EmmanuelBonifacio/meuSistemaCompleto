# =============================================================================
# docker/nginx/nginx.conf
# =============================================================================
# Nginx como reverse proxy na frente do backend (Fastify) e frontend (Next.js).
#
# Fluxo de requisição:
#   Browser → Nginx (443) → api.seudominio.com → backend:3000
#                         → app.seudominio.com → frontend:3001
#
# Para usar SSL local em dev, gere certificados autoassinados:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout docker/nginx/certs/key.pem \
#     -out docker/nginx/certs/cert.pem -subj "/CN=localhost"
# =============================================================================

# Número de workers = número de CPUs disponíveis
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log de acesso estruturado (facilita análise)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;

    # Oculta versão do Nginx nos headers (segurança por obscuridade)
    server_tokens off;

    # Tamanho máximo de upload (deve ser >= ao limite do backend)
    client_max_body_size 110m;

    # ─── Upstream: Backend (Fastify) ─────────────────────────────────────────
    upstream backend {
        server backend:3000;
    }

    # ─── Upstream: Frontend (Next.js) ────────────────────────────────────────
    upstream frontend {
        server frontend:3001;
    }

    # ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── API: api.seudominio.com ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.seudominio.com;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Servir uploads diretamente pelo Nginx (mais eficiente que pelo Node.js)
        location /uploads/ {
            alias /uploads/;
            expires 10m;
            add_header Cache-Control "public, max-age=600";
            # Previne execução de scripts em arquivos de upload
            types { }
            default_type application/octet-stream;
        }

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";  # WebSocket (Socket.IO)
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ─── App: app.seudominio.com ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.seudominio.com;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}

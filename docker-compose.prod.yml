# =============================================================================
# docker-compose.prod.yml  (produção)
# =============================================================================
# Stack completa: PostgreSQL + Backend + Frontend + Nginx.
#
# Uso:
#   cp .env.example .env          # preencha as variáveis
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Para rebuild de um serviço específico:
#   docker compose -f docker-compose.prod.yml up -d --build backend
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres NÃO expõe porta externamente em produção — acesso apenas interno
    networks:
      - internal

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend_prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-1h}
      FRONTEND_URL: ${FRONTEND_URL}
      UPLOADS_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: frontend_prod
    restart: always
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    # envsubst substitui ${DOMAIN} no template e gera o nginx.conf final
    command: >
      /bin/sh -c "
        envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - uploads_data:/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  # Certbot: renova o certificado automaticamente a cada 12h
  # (Let's Encrypt só renova se faltar < 30 dias para expirar)
  certbot:
    image: certbot/certbot
    container_name: certbot_prod
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew;
          sleep 12h & wait $${!};
        done
      "
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_prod_data:
  uploads_data:
  letsencrypt_data:
  certbot_www:
